<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aperiodic Path Denial Engine v1.0 - Security Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#ddd;padding:10px}
#app{max-width:960px;margin:auto}
.row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1rem;align-items:flex-end}
.cg{display:flex;flex-direction:column;gap:4px}
.cg label{font-size:12px;color:#aaa}
.cg select, .cg input{font-size:14px;padding:6px 10px;background:#1a1a1a;color:#ddd;border:1px solid #444;border-radius:6px}
.btn{padding:8px 18px;font-size:14px;border-radius:6px;border:1px solid #555;background:#222;color:#fff;cursor:pointer}
.btn:hover{background:#444}
canvas{display:block;width:100%;max-width:100%;border-radius:8px;border:1px solid #444;background:#111}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:12px}
.m{background:#1f1f1f;border-radius:8px;padding:10px}
.ml{font-size:11px;color:#999;margin-bottom:3px}
.mv{font-size:22px;font-weight:600}
.g{color:#4ade80}.b{color:#f87171}.w{color:#fbbf24}
.verdict{margin-top:10px;padding:12px;border-radius:8px;border-left:4px solid;font-size:14px}
.vs{border-color:#4ade80;color:#4ade80;background:#14532d}
.vw{border-color:#f87171;color:#f87171;background:#450a0a}
.vm{border-color:#fbbf24;color:#fbbf24;background:#451a0a}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0;font-size:12.5px;color:#aaa}
.sw{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:4px}
</style>
</head>
<body>
<div id="app">
<h1 style="margin-bottom:12px">Aperiodic Path Denial <span style="font-size:14px;color:#666">v1.0 — Security Edition</span></h1>
<p style="color:#777;margin-bottom:16px">Hostile vehicle mitigation • Perimeter design • Crowd flow disruption</p>

<div class="row">
  <div class="cg">
    <label>Layout Style</label>
    <select id="lt">
      <option value="aperiodic" selected>Aperiodic Interlock</option>
      <option value="random">Random Bollard</option>
      <option value="hex">Hex Barrier</option>
    </select>
  </div>
  <div class="cg">
    <label>Grid Size</label>
    <select id="gs">
      <option value="9" selected>9×9</option>
      <option value="12">12×12</option>
      <option value="15">15×15</option>
    </select>
  </div>
  <div class="cg">
    <label>Threat Direction</label>
    <select id="sd">
      <option value="0" selected>Vehicle Approach (L→R)</option>
      <option value="90">Vertical Assault</option>
      <option value="45">Diagonal Breach</option>
    </select>
  </div>
  <button class="btn" id="rb">Analyze Layout</button>
  <button class="btn" id="report">Generate Security Report</button>
</div>

<canvas id="cv" width="800" height="400"></canvas>

<div class="leg">
  <span><span class="sw" style="background:#5a9fd4"></span>Barrier Tile</span>
  <span><span class="sw" style="background:#c44"></span>Vehicle Path</span>
  <span><span class="sw" style="background:#c80"></span>Seam / Gap</span>
  <span><span class="sw" style="background:#9966dd"></span>Entry / Exit Points</span>
</div>

<div class="metrics" id="mx"></div>
<div id="vd"></div>
</div>

<script>
// Same core engine as original, with security-focused labels and metrics
// (Full original functions would be here - identical math, different UI text)

const ctx = cv.getContext('2d');

cv.width = W; cv.height = H;

document.getElementById('report').addEventListener('click', () => {

});

['lt','gs','sd'].forEach(id => document.getElementById(id).addEventListener('change', run));
run();
</script>
</body>
</html>
